name: flutter_json_editor
description: A Flutter widget that dynamically generates forms from JSON Schema (Draft 7) with full CRUD support, inline validation, and customizable field editors.
version: 0.5.0
homepage: https://github.com/safenow/flutter_json_editor

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_svg: ^2.0.17
  intl: any
  json_schema: ^5.2.2
  uuid: ^4.0.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
